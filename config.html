<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Config Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md md:max-w-3xl">
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        修改環境變數
      </h2>

      <form method="POST" action="/config" class="space-y-6">
        <div>
          <label for="BARK_API" class="block text-gray-700 mb-2"
            >BARK_API:</label
          >
          <input
            type="text"
            name="BARK_API"
            id="BARK_API"
            value="${BARK_API}"
            class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label for="SOCKET_API" class="block text-gray-700 mb-2"
            >SOCKET_API:</label
          >
          <input
            type="text"
            name="SOCKET_API"
            id="SOCKET_API"
            value="${SOCKET_API}"
            class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label for="BING_TRANSLATE_API_KEY" class="block text-gray-700 mb-2"
            >BING_TRANSLATE_API_KEY (選填，Microsoft 翻譯備援):</label
          >
          <input
            type="text"
            name="BING_TRANSLATE_API_KEY"
            id="BING_TRANSLATE_API_KEY"
            value="${BING_TRANSLATE_API_KEY}"
            class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <hr class="my-6 border-gray-300" />
        <h3 class="text-xl font-bold text-gray-800 mb-4">Kick 設定</h3>

        <div>
          <label for="KICK_CLIENT_ID" class="block text-gray-700 mb-2"
            >KICK_CLIENT_ID:</label
          >
          <input
            type="text"
            name="KICK_CLIENT_ID"
            id="KICK_CLIENT_ID"
            value="${KICK_CLIENT_ID}"
            class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label for="KICK_CLIENT_SECRET" class="block text-gray-700 mb-2"
            >KICK_CLIENT_SECRET:</label
          >
          <input
            type="text"
            name="KICK_CLIENT_SECRET"
            id="KICK_CLIENT_SECRET"
            value="${KICK_CLIENT_SECRET}"
            class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label for="KICK_USER_NAME" class="block text-gray-700 mb-2"
            >KICK_USER_NAME (頻道名稱):</label
          >
          <input
            type="text"
            name="KICK_USER_NAME"
            id="KICK_USER_NAME"
            value="${KICK_USER_NAME}"
            class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="mt-4">
          <a href="/kick-login"
            class="inline-block w-full text-center bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition font-bold">
            🔑 Kick OAuth 登入（取得頭像）
          </a>
        </div>

        <div class="flex space-x-4 mt-4">
          <button
            type="submit"
            class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
          >
            儲存
          </button>
          <button
            type="button"
            onclick="logout()"
            class="flex-1 bg-gray-400 text-white py-2 rounded-lg hover:bg-gray-500 transition"
          >
            登出
          </button>
          <button
            type="button"
            onclick="back_home()"
            class="flex-1 bg-gray-400 text-white py-2 rounded-lg hover:bg-gray-500 transition"
          >
            回主頁
          </button>
        </div>
      </form>
    </div>

    <script>
        async function logout() {
            try {
            await fetch("/logout", { method: "GET", credentials: "include" });
            // 清除後端 Cookie 後，導回登入頁
            window.location.href = "/config";
            } catch (err) {
            console.error(err);
            alert("登出失敗");
            }
        }

        async function back_home() {
            window.location.href = "/";
        }

    </script>
  </body>
</html>
