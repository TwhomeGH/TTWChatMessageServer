<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贊助廣告管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: system-ui, -apple-system, sans-serif; }
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
.status-approved { background: #22c55e; }
.status-pending { background: #eab308; }
.status-rejected { background: #ef4444; }
.status-disabled { background: #6b7280; }
</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
<div class="max-w-5xl mx-auto">

<div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold">📢 贊助廣告管理</h1>
    <div class="flex gap-3">
        <a href="/" class="text-blue-400 hover:text-blue-300 underline text-sm">首頁</a>
        <a href="/config" class="text-blue-400 hover:text-blue-300 underline text-sm">設定</a>
        <button onclick="logout()" class="text-red-400 hover:text-red-300 underline text-sm">登出</button>
    </div>
</div>

<!-- 審核模式設定 -->
<div class="bg-gray-800 rounded-2xl shadow-lg p-6 mb-6">
    <h2 class="text-lg font-semibold mb-4">⚙️ 審核模式</h2>
    <div class="flex flex-wrap gap-6 items-end">
        <div>
            <label class="block text-sm text-gray-400 mb-2">新贊助廣告審核方式</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="reviewMode" value="none" class="accent-blue-500" onchange="onSettingsChange()">
                    <span>不需審核</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="reviewMode" value="filter" class="accent-blue-500" onchange="onSettingsChange()">
                    <span>過濾器自動審核</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="reviewMode" value="manual" class="accent-blue-500" onchange="onSettingsChange()">
                    <span>手動審核</span>
                </label>
            </div>
        </div>
        <div>
            <button onclick="saveSettings()" id="saveSettingsBtn" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition disabled:opacity-50" disabled>儲存設定</button>
        </div>
    </div>
    <p id="settingsStatus" class="text-sm mt-3 hidden"></p>
</div>

<!-- 手動新增廣告 -->
<div class="bg-gray-800 rounded-2xl shadow-lg p-6 mb-6">
    <h2 class="text-lg font-semibold mb-4">➕ 手動新增贊助廣告</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm text-gray-400 mb-1">使用者 ID *</label>
            <input id="newUserId" class="w-full bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" placeholder="Twitch 使用者 ID">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">顯示名稱</label>
            <input id="newDisplayName" class="w-full bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" placeholder="留空則用使用者 ID">
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm text-gray-400 mb-1">廣告訊息 *</label>
            <textarea id="newMessage" class="w-full bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" rows="2" placeholder="輸入廣告文字，支援 emoji 圖片網址"></textarea>
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">圖示 URL（選填）</label>
            <input id="newIconURL" class="w-full bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" placeholder="https://example.com/icon.png">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">自訂顯示名稱</label>
            <input id="newOverlayUser" class="w-full bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" placeholder="疊加層顯示的名稱">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">目標 ID（選填）</label>
            <input id="newTargetId" type="number" min="0" class="w-full bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" placeholder="留空則新增，0-4 更新指定廣告">
        </div>
        <div class="flex items-center gap-6">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="newUseTTS" class="accent-blue-500">
                <span class="text-sm">啟用 TTS</span>
            </label>
            <div>
                <label class="block text-sm text-gray-400 mb-1">間隔（分鐘）</label>
                <input id="newInterval" type="number" min="0" class="w-24 bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm border border-gray-600 focus:border-blue-500 outline-none" placeholder="0=單次" value="0">
            </div>
        </div>
    </div>
    <div class="mt-4 flex items-center gap-3">
        <button onclick="createAd()" id="createAdBtn" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition">建立廣告</button>
        <span id="createStatus" class="text-sm hidden"></span>
    </div>
</div>

<!-- 贊助廣告列表 -->
<div id="adsContainer">
    <div class="text-center text-gray-500 py-12">載入中...</div>
</div>

</div>

<script>
let currentData = { settings: { reviewMode: 'none' }, users: {} };

async function loadAds() {
    try {
        const res = await fetch('/api/sponsor-ads');
        currentData = await res.json();
        render();
    } catch (err) {
        document.getElementById('adsContainer').innerHTML = `<div class="text-center text-red-400 py-12">載入失敗: ${err.message}</div>`;
    }
}

function render() {
    const settings = currentData.settings || { reviewMode: 'none' };
    document.querySelectorAll('input[name="reviewMode"]').forEach(el => {
        el.checked = el.value === settings.reviewMode;
    });
    document.getElementById('saveSettingsBtn').disabled = true;
    document.getElementById('settingsStatus').classList.add('hidden');

    const container = document.getElementById('adsContainer');
    const users = currentData.users || {};
    const userIds = Object.keys(users);
    if (userIds.length === 0) {
        container.innerHTML = `<div class="text-center text-gray-500 py-12">目前沒有贊助廣告資料</div>`;
        return;
    }
    let html = '';
    // 預先收集所有圖片 URL 並載入快取
    const imgRegex = /(https?:\/\/[^\s<>]+?\.(?:png|jpg|jpeg|gif|webp|svg)(?:\?[^\s<>]*)?)/gi;
    for (const uid of userIds) {
        const user = users[uid];
        if (!user.ads) continue;
        for (const ad of user.ads) {
            let m;
            imgRegex.lastIndex = 0;
            while ((m = imgRegex.exec(ad.message || '')) !== null) preloadEmoji(m[1]);
            if (ad.iconURL) preloadEmoji(ad.iconURL);
        }
    }
    for (const uid of userIds) {
        const user = users[uid];
        if (!user.ads || user.ads.length === 0) continue;
        html += `<div class="bg-gray-800 rounded-2xl shadow-lg p-6 mb-4">`;
        html += `<div class="flex items-center justify-between mb-4">`;
        html += `<h3 class="text-lg font-semibold">👤 ${escapeHtml(user.displayName)}</h3>`;
        html += `<span class="text-sm text-gray-400">ID: ${uid}</span>`;
        html += `</div>`;
        for (const ad of user.ads) {
            const status = ad.approved === null ? 'pending' : (ad.approved ? 'approved' : 'rejected');
            const statusText = status === 'approved' ? '已通過' : (status === 'pending' ? '待審核' : '已拒絕');
            html += `<div class="border border-gray-700 rounded-xl p-4 mb-3 ${ad.intervalMinutes > 0 && !ad.enabled ? 'opacity-60' : ''}">`;
            html += `<div class="flex items-start justify-between gap-4">`;
            html += `<div class="flex-1 min-w-0">`;
            html += `<div class="flex items-center gap-3 mb-2 flex-wrap">`;
            html += `<span class="status-dot status-${status}"></span>`;
            html += `<span class="text-sm font-medium">${statusText}</span>`;
            if (ad.intervalMinutes > 0) {
                html += `<span class="text-xs bg-gray-700 px-2 py-0.5 rounded">每 ${ad.intervalMinutes} 分鐘</span>`;
                if (ad.enabled) {
                    html += `<span class="text-xs bg-green-900 text-green-300 px-2 py-0.5 rounded">啟用中</span>`;
                } else {
                    html += `<span class="text-xs bg-gray-700 text-gray-400 px-2 py-0.5 rounded">已停用</span>`;
                }
            } else {
                html += `<span class="text-xs bg-gray-700 px-2 py-0.5 rounded">單次</span>`;
            }
            html += `</div>`;
            html += `<p class="text-gray-200 break-words">${renderMessage(ad.message)}</p>`;
            if (ad.overlayUser) {
                html += `<p class="text-xs text-gray-500 mt-1">顯示名稱: ${escapeHtml(ad.overlayUser)}</p>`;
            }
            if (ad.iconURL) {
                html += `<div class="flex items-center gap-2 mt-1"><img src="${escapeHtml(ad.iconURL)}" class="w-5 h-5 rounded" onerror="this.style.display='none'"><span class="text-xs text-gray-500 truncate">${escapeHtml(ad.iconURL)}</span></div>`;
            }
            if (ad.lastSentAt) {
                html += `<p class="text-xs text-gray-500 mt-1">最後發送: ${new Date(ad.lastSentAt).toLocaleString()}</p>`;
            }
            if (ad.intervalMinutes > 0 && ad.enabled && ad.lastSentAt) {
                const nextMs = new Date(ad.lastSentAt).getTime() + ad.intervalMinutes * 60 * 1000;
                // 如果已超過一個完整週期還沒更新，代表伺服器重啟後定時器遺失，不顯示倒數
                if (nextMs > Date.now() - ad.intervalMinutes * 60 * 1000) {
                    html += `<p class="text-xs mt-1 countdown" data-next="${nextMs}">⏳ 下次發送: 計算中...</p>`;
                }
            }
            html += `<p class="text-xs text-gray-600 mt-1">建立: ${new Date(ad.createdAt).toLocaleString()}</p>`;
            html += `</div>`;
            html += `<div class="flex flex-col gap-2 shrink-0">`;
            if (status === 'pending') {
                html += `<button onclick="approveAd('${ad.id}', true)" class="bg-green-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-green-700 transition">✅ 通過</button>`;
                html += `<button onclick="approveAd('${ad.id}', false)" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-red-700 transition">❌ 拒絕</button>`;
            }
            if (ad.intervalMinutes > 0) {
                html += `<button onclick="toggleAd('${ad.id}', ${!ad.enabled})" class="bg-gray-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-gray-500 transition">${ad.enabled ? '⏸️ 停用' : '▶️ 啟用'}</button>`;
            }
            html += `<button onclick="deleteAd('${ad.id}')" class="bg-red-800 text-red-200 text-xs px-3 py-1.5 rounded-lg hover:bg-red-700 transition">🗑️ 刪除</button>`;
            html += `</div>`;
            html += `</div>`;
            html += `</div>`;
        }
        html += `</div>`;
    }
    container.innerHTML = html;
}

function onSettingsChange() {
    document.getElementById('saveSettingsBtn').disabled = false;
}

async function createAd() {
    const userId = document.getElementById('newUserId').value.trim();
    const message = document.getElementById('newMessage').value.trim();
    if (!userId || !message) {
        alert('請填寫使用者 ID 與廣告訊息');
        return;
    }
    const payload = {
        userId,
        displayName: document.getElementById('newDisplayName').value.trim() || userId,
        overlayUser: document.getElementById('newOverlayUser').value.trim() || null,
        message,
        iconURL: document.getElementById('newIconURL').value.trim() || null,
        useTTS: document.getElementById('newUseTTS').checked,
        intervalMinutes: parseInt(document.getElementById('newInterval').value) || 0,
        targetId: (() => { const v = document.getElementById('newTargetId').value.trim(); return v ? parseInt(v) : undefined; })()
    };
    const btn = document.getElementById('createAdBtn');
    const statusEl = document.getElementById('createStatus');
    btn.disabled = true;
    btn.textContent = '建立中...';
    statusEl.className = 'text-sm hidden';
    try {
        const res = await fetch('/api/sponsor-ads/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(await res.text());
        statusEl.className = 'text-sm text-green-400';
        statusEl.textContent = '✅ 廣告已建立';
        statusEl.classList.remove('hidden');
        document.getElementById('newUserId').value = '';
        document.getElementById('newDisplayName').value = '';
        document.getElementById('newOverlayUser').value = '';
        document.getElementById('newMessage').value = '';
        document.getElementById('newIconURL').value = '';
        document.getElementById('newUseTTS').checked = false;
        document.getElementById('newInterval').value = '0';
        document.getElementById('newTargetId').value = '';
        setTimeout(() => { statusEl.classList.add('hidden'); }, 3000);
        await loadAds();
    } catch (err) {
        statusEl.className = 'text-sm text-red-400';
        statusEl.textContent = `❌ 建立失敗: ${err.message}`;
        statusEl.classList.remove('hidden');
    }
    btn.disabled = false;
    btn.textContent = '建立廣告';
}

async function saveSettings() {
    const reviewMode = document.querySelector('input[name="reviewMode"]:checked').value;
    const btn = document.getElementById('saveSettingsBtn');
    btn.disabled = true;
    btn.textContent = '儲存中...';
    const statusEl = document.getElementById('settingsStatus');
    try {
        const res = await fetch('/api/sponsor-ads/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ settings: { reviewMode } })
        });
        if (!res.ok) throw new Error(await res.text());
        statusEl.className = 'text-sm mt-3 text-green-400';
        statusEl.textContent = '✅ 設定已儲存';
        statusEl.classList.remove('hidden');
        currentData.settings.reviewMode = reviewMode;
    } catch (err) {
        statusEl.className = 'text-sm mt-3 text-red-400';
        statusEl.textContent = `❌ 儲存失敗: ${err.message}`;
        statusEl.classList.remove('hidden');
        btn.disabled = false;
    }
    btn.textContent = '儲存設定';
}

async function approveAd(adId, approved) {
    try {
        const res = await fetch('/api/sponsor-ads/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adId, approved })
        });
        if (!res.ok) throw new Error(await res.text());
        await loadAds();
    } catch (err) {
        alert(`操作失敗: ${err.message}`);
    }
}

async function toggleAd(adId, enabled) {
    try {
        const res = await fetch('/api/sponsor-ads/toggle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adId, enabled })
        });
        if (!res.ok) throw new Error(await res.text());
        await loadAds();
    } catch (err) {
        alert(`操作失敗: ${err.message}`);
    }
}

async function deleteAd(adId) {
    if (!confirm('確定要刪除此贊助廣告？')) return;
    try {
        const res = await fetch('/api/sponsor-ads/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adId })
        });
        if (!res.ok) throw new Error(await res.text());
        await loadAds();
    } catch (err) {
        alert(`操作失敗: ${err.message}`);
    }
}

function logout() {
    fetch('/logout').then(() => { window.location.href = '/sponsor'; });
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

// ---- Emoji 圖片快取 ----
const emojiCache = new Set();

function preloadEmoji(url) {
    if (!url || emojiCache.has(url)) return;
    emojiCache.add(url);
    const img = new Image();
    img.src = url;
}

function renderMessage(msg) {
    if (!msg) return '';
    const escaped = escapeHtml(msg);
    return escaped.replace(/(https?:\/\/[^\s<>]+?\.(?:png|jpg|jpeg|gif|webp|svg)(?:\?[^\s<>]*)?)/gi,
        '<img src="$1" class="inline-block w-5 h-5 align-middle mx-0.5" title="$1">');
}

function updateCountdowns() {
    const now = Date.now();
    let needsReload = false;
    document.querySelectorAll('.countdown').forEach(el => {
        const nextMs = parseInt(el.dataset.next);
        if (!nextMs) return;
        const diff = nextMs - now;
        const wasPending = el.dataset.pending === 'true';
        if (diff <= 0) {
            el.textContent = '⏳ 即將發送...';
            el.dataset.pending = 'true';
            if (!wasPending) {
                el.dataset.zeroAt = String(now);
            } else {
                const zeroAt = parseInt(el.dataset.zeroAt) || now;
                // 倒數歸零超過 3 秒才 reload，給伺服器時間更新 lastSentAt
                if (now - zeroAt > 3000) needsReload = true;
            }
        } else {
            el.dataset.pending = 'false';
            el.dataset.zeroAt = '';
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            el.textContent = `⏳ 下次發送: ${m}分${s}秒後`;
        }
    });
    if (needsReload) loadAds();
}

loadAds();
setInterval(updateCountdowns, 1000);
</script>
</body>
</html>
