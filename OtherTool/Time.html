<style>
    body {
        background-color: rgba(0, 0, 0, 0.8);
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        /* 改成垂直排列，避免橫向撐開 */
        justify-content: center;
        /* 垂直置中 */
        align-items: center;
        /* 水平置中 */
        height: 100vh;
        /* 讓容器填滿視窗高度 */
        margin: 0;
        overflow: hidden;
    }

    #Time {
        font-size: 5vw;
        /* 根據寬高自適應，取較小值避免溢出 */
        line-height: 1.2em;
        text-align: left;
        transition: opacity 0.5s ease;
    }

    #Marquee {
        font-size: 4vw;
        line-height: 1.5em;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        width: 100%;
        opacity: 0;
        position: absolute;
        transition: opacity 0.5s ease;
    }

    #Marquee.visible {
        opacity: 1;
    }

    #MarqueeContent {
        display: inline-block;
        padding-left: 100%;
        animation: marquee 20s linear infinite;
    }

    @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }

    #Time.hidden {
        opacity: 0;
    }
</style>

<script language="JavaScript" type="text/javascript">

    const MARQUEE_MESSAGES = [
        "MCBE服務器 IP: coffee3333.ccwu.cc Port: 19132",
        "松鼠推流 ReplyKIT 適用於iOS端的推流應用！"
    ];

    let isShowingMarquee = false;
    let marqueeIndex = 0;
    let showTimeTimeout = null;
    let marqueeSwitchTimeout = null;

    function TimeCount(NTime) {
        /**
         * NTime 結束時間 格式->2023/2/10
         * 
         * @return Array 返回天/時/分/秒
         * */
        NowTime = new Date().getTime()
        NextTime = new Date(NTime).getTime()
        Result = Math.floor((NextTime - NowTime) / 1000)

        ResultT = [
            `${Math.floor(Result / 60 / 60 / 24)}天`, //天數
            `${Math.floor(Result / 60 / 60 % 24)}時`,//小時
            `${Math.floor(Result / 60 % 60)}分`,//分鐘
            `${Math.floor(Result % 60)}秒`//秒數
        ]
        return ResultT
    }

    function ShowTime() {
        if (isShowingMarquee) return;

        var NowDate = new Date();
        var D = NowDate.getDay();
        var DayNames = [
            "週日", "週一", "週二",
            "週三", "週四", "週五", "週六"
        ];
        let Time = document.getElementById('Time');

        let TimeSet = new Date('2024/7/9')
        let CountDown_Time = TimeCount(TimeSet)

        Display = [
            `目前時間：${NowDate.toLocaleString()}🍫${DayNames[D]}`
        ]

        Time.innerHTML = Display.join("");
        Time.classList.remove("hidden");

        showTimeTimeout = setTimeout(ShowTime, 10);
    }

    function ShowMarquee() {
        if (!isShowingMarquee) return;

        const marquee = document.getElementById('Marquee');
        const marqueeContent = document.getElementById('MarqueeContent');
        
        marqueeContent.textContent = MARQUEE_MESSAGES[marqueeIndex];
        marquee.classList.add('visible');

        marqueeIndex = (marqueeIndex + 1) % MARQUEE_MESSAGES.length;

        marqueeSwitchTimeout = setTimeout(ShowMarquee, 60000);
    }

    function SwitchToMarquee() {
        const timeEl = document.getElementById('Time');
        const marquee = document.getElementById('Marquee');
        
        isShowingMarquee = true;
        timeEl.classList.add('hidden');
        
        if (showTimeTimeout) {
            clearTimeout(showTimeTimeout);
            showTimeTimeout = null;
        }

        setTimeout(() => {
            ShowMarquee();
        }, 500);

        setTimeout(SwitchToTime, 60000);
    }

    function SwitchToTime() {
        const timeEl = document.getElementById('Time');
        const marquee = document.getElementById('Marquee');
        
        isShowingMarquee = false;
        marquee.classList.remove('visible');
        
        if (marqueeSwitchTimeout) {
            clearTimeout(marqueeSwitchTimeout);
            marqueeSwitchTimeout = null;
        }

        setTimeout(() => {
            timeEl.classList.remove('hidden');
            ShowTime();
        }, 500);

        setTimeout(SwitchToMarquee, 60000);
    }

    function InitDisplay() {
        ShowTime();
        setTimeout(SwitchToMarquee, 60000);
    }
</script>

<body onload="InitDisplay()">

    <div id="Time"></div>
    <div id="Marquee"><span id="MarqueeContent"></span></div>

</body>
