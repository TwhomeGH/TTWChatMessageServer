version: "3.8"

services:
  tiktok-signature:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
      - MAX_GENERATIONS_BEFORE_REFRESH=${MAX_GENERATIONS_BEFORE_REFRESH:-500}
      - MAX_SESSION_AGE_MS=${MAX_SESSION_AGE_MS:-1800000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
